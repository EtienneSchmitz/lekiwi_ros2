# Nav2 navigation stack configuration for LeKiwi.
#
# Robot: 3-wheel holonomic omni-drive, indoor flat floor.
# Sensors: LiDAR (/scan) only — no depth camera.
# Localization: slam_toolbox (mapping) or AMCL (localize/amcl) — see navigation.launch.py.
# Odometry: robot_localization EKF → /odometry/filtered.
#
# Loaded by nav2.launch.py (lekiwi_navigation) via the params_file argument.

# ── BT Navigator ──────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    error_code_name_prefixes:
      - backup
      - compute_path
      - follow_path
      - nav_to_pose
      - spin
      - wait

# ── Controller Server (MPPI — Omni model) ─────────────────────────────────────
# MPPI natively supports holonomic motion via motion_model: Omni.
# batch_size reduced from the default 2000 to 1000 for Raspberry Pi 5.
# visualize disabled to save CPU on the Pi.
controller_server:
  ros__parameters:
    controller_frequency: 10.0        # Hz — Pi5-friendly; default is 20
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001   # omni — y velocity is valid
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.25  # trigger recovery sooner when stuck near furniture (was 0.5)
      movement_time_allowance: 8.0    # less patience in a small room (was 10.0)

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 28
      model_dt: 0.1
      batch_size: 1000            # reduced from 2000 for Pi5
      # Velocity limits — must not exceed base_controller hardware limits:
      #   vx_max: 0.2 m/s, vy_max: 0.17 m/s, wz_max: 0.68 rad/s (control.yaml)
      vx_max: 0.2
      vx_min: -0.2
      vy_max: 0.17                # omni — lateral motion is valid
      vy_min: -0.17
      wz_max: 0.68
      wz_min: -0.68
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      # Acceleration limits — must not exceed base_controller hardware limits:
      #   ax: 1.0 m/s², ay: 0.85 m/s², az: 3.4 rad/s² (control.yaml)
      ax_max: 1.0
      ax_min: -1.0
      ay_max: 0.85
      ay_min: -0.85
      az_max: 3.4
      iteration_count: 1
      prune_distance: 1.2          # adequate for small rooms; not excessive in large spaces
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"        # holonomic — robot can move in any direction
      visualize: false            # disable trajectory visualization to save CPU
      regenerate_noises: true
      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic",
        ]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.0   # switch to goal-seeking at 1.0 m — works for both small and large spaces
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.5
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false  # costmap uses robot_radius, no polygon footprint
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 3   # evaluate every 3rd point (was 2) — saves ~33% obstacle queries on Pi5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 15.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 12    # enough look-ahead for both tight and open spaces
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 4     # moderate carrot distance; works in corridors and small rooms
        threshold_to_consider: 1.0  # consistent with GoalCritic
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0                   # FORWARD — robot aligns heading to path direction; pairs with PreferForwardCritic
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.5          # penalises non-forward trajectories; lower to allow more strafing
        threshold_to_consider: 0.5

# ── Local Costmap ─────────────────────────────────────────────────────────────
# 2 × 2 m rolling window — sufficient for 0.2 m/s in a ≤25 m² room.
# MPPI trajectory spans 28 × 0.1 s × 0.2 m/s = 0.56 m; 1 m half-window covers it.
# Single 2D obstacle layer fed by /scan (no voxel/3D layer — lidar only).
# robot_radius: wheel contact radius 0.132239 m (URDF/control.yaml) + ~3.8 cm safety margin.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 1.0      # publish at 1 Hz — sufficient for Foxglove/Rviz; saves Zenoh bandwidth on Pi5
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 2    # reduced from 3 — saves CPU; plenty for 0.2 m/s robot in small room
      height: 2   # reduced from 3
      resolution: 0.05
      robot_radius: 0.17
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.20
      always_send_full_costmap: true

# ── Global Costmap ────────────────────────────────────────────────────────────
# Full map static layer + live obstacle layer from /scan.
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.17
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: false  # global map is large — only publish on change

# ── Planner Server (SMAC 2D) ──────────────────────────────────────────────────
# SmacPlanner2D uses A* on the 2D costmap with no kinematic constraints — the
# correct choice for a holonomic/omni robot. Compared to NavFn it provides
# proper footprint collision checking and an integrated path smoother.
# SmacPlannerHybrid is for car-like non-holonomic robots (not appropriate here).
# SmacPlannerLattice supports holonomic motion but requires generating motion
# primitive files — not worth the overhead for a simple indoor robot.
planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0   # Hz — replans at most once/s; sufficient for slow robot (0.2 m/s) in indoor spaces
    costmap_update_timeout: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.25                   # m — goal tolerance (tighter than NavFn's 0.5)
      downsample_costmap: false         # costmap is already at 0.05 m/cell — no need
      downsampling_factor: 1
      allow_unknown: true               # plan through unknown space
      max_iterations: 1000000
      max_on_approach_iterations: 1000  # refine near goal
      max_planning_time: 2.0            # s — sufficient for paths up to ~100 m²; fail fast enough to avoid long stutters
      cost_travel_multiplier: 2.0       # penalise high-cost (near-obstacle) cells
      use_final_approach_orientation: false  # omni — any arrival heading is fine
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

# ── Behavior Server ───────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
      acceleration_limit: 1.0      # matches base_controller ax_max (control.yaml)
      deceleration_limit: -1.0     # matches base_controller ax_min (control.yaml)
      minimum_speed: 0.10
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 1.5    # adequate for both small rooms and open demonstration spaces
    max_rotational_vel: 0.68   # matches base_controller wz_max (control.yaml)
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.4    # matches base_controller az_max (control.yaml)

# ── Velocity Smoother ─────────────────────────────────────────────────────────
# Reads cmd_vel_raw (remapped from cmd_vel in nav2.launch.py) — the raw MPPI
# output — and rate-limits it before it reaches collision_monitor → twist_switch.
# Output topic is cmd_vel_smoothed (default); collision_monitor reads it.
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # Limits match base_controller hardware limits in control.yaml [vx, vy, wz]
    max_velocity: [0.2, 0.17, 0.68]
    min_velocity: [-0.2, -0.17, -0.68]
    max_accel: [1.0, 0.85, 3.4]
    max_decel: [-1.0, -0.85, -3.4]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ── Collision Monitor ─────────────────────────────────────────────────────────
# Last-resort safety layer: reads cmd_vel_smoothed from velocity_smoother,
# checks the robot's footprint approach zone against /scan, and either passes
# the command through or stops the robot before a collision.
#
# cmd_vel_in_topic  — output of velocity_smoother (hardcoded topic name)
# cmd_vel_out_topic — goes to twist_switch_node (/cmd_vel_nav)
#
# FootprintApproach: uses the live local_costmap footprint polygon.
# time_before_collision: 1.2 s at 0.2 m/s ≈ 24 cm look-ahead.
collision_monitor:
  ros__parameters:
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel_nav"  # twist_switch_node subscribes here
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.05   # low — LeKiwi body is close to the floor
      max_height: 2.0
      enabled: true
