# Pont ros_gz_bridge : Gazebo Ionic <-> ROS 2.
#   - /clock : horloge sim (GZ -> ROS), indispensable a use_sim_time
#   - /scan  : LiDAR D500 (GZ -> ROS), sensor_msgs/LaserScan
# (cmd_vel / odom / tf passent par ros2_control, pas par le pont.)
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic_name: "/scan"
  gz_topic_name: "/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/imu/data"
  gz_topic_name: "/imu/data"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS
