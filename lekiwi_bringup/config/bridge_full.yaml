# Pont ros_gz_bridge : Gazebo Ionic <-> ROS 2 — PLATEFORME de manipulation mobile.
#   - /clock, /scan, /imu/data : comme la base LeKiwi standalone (bridge.yaml)
#   - cameras RGB-D wrist + scene : image, depth_image, points, camera_info
# Les topics camera n'existent que si la camera correspondante est activee
# (args wrist_camera / scene_camera du xacro). Une entree de pont sans topic GZ
# source reste inerte, donc ce fichier convient quelle que soit la config camera.

# ------------------------------- Base / capteurs -----------------------------
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic_name: "/scan"
  gz_topic_name: "/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/imu/data"
  gz_topic_name: "/imu/data"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# ------------------------------- Camera WRIST (eye-in-hand) -------------------
- ros_topic_name: "/wrist_camera/image"
  gz_topic_name: "/wrist_camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/wrist_camera/depth_image"
  gz_topic_name: "/wrist_camera/depth_image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/wrist_camera/points"
  gz_topic_name: "/wrist_camera/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS

- ros_topic_name: "/wrist_camera/camera_info"
  gz_topic_name: "/wrist_camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

# ------------------------------- Camera SCENE (fixe) -------------------------
- ros_topic_name: "/scene_camera/image"
  gz_topic_name: "/scene_camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/scene_camera/depth_image"
  gz_topic_name: "/scene_camera/depth_image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
