# twist_mux : arbitre les sources de vitesse vers /cmd_vel (TwistStamped).
#   - teleop (priorite haute) : /cmd_vel_teleop
#   - navigation Nav2          : /cmd_vel_nav
# Sortie : cmd_vel_out (remappe vers /cmd_vel dans le launch).
twist_mux:
  ros__parameters:
    use_sim_time: true
    use_stamped: true            # entrees/sortie en geometry_msgs/TwistStamped
    topics:
      teleop:
        topic: cmd_vel_teleop
        timeout: 0.5
        priority: 100
      navigation:
        topic: cmd_vel_nav
        timeout: 0.5
        priority: 50
