# Controleurs ros2_control de la PLATEFORME de manipulation mobile (sim Gazebo).
# Un seul controller_manager pour les deux robots :
#   - joint_state_broadcaster      : publie /joint_states (base + bras)
#   - omni_wheel_drive_controller  : /cmd_vel (TwistStamped) -> 3 roues, odom
#   - arm_controller               : trajectoires du bras SO-101 (joints arm_*)
#   - gripper_controller           : pince (arm_gripper)
controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omni_wheel_drive_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: parallel_gripper_action_controller/GripperActionController

# ----------------------------- Base mobile -----------------------------------
omni_wheel_drive_controller:
  ros__parameters:
    use_sim_time: true
    wheel_names: ["left_wheel_joint", "back_wheel_joint", "right_wheel_joint"]
    wheel_offset: 1.0471975512   # pi/3 = 60 deg (1re roue : left_wheel a 60 deg)
    robot_radius: 0.132239       # centre -> contact roue
    wheel_radius: 0.051
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    enable_odom_tf: false        # la tf odom->base_footprint est publiee par l'EKF
    open_loop: false
    position_feedback: true
    cmd_vel_timeout: 0.5
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

# ----------------------------- Bras SO-101 (prefixe arm_) --------------------
arm_controller:
  ros__parameters:
    joints:
      - arm_shoulder_pan
      - arm_shoulder_lift
      - arm_elbow_flex
      - arm_wrist_flex
      - arm_wrist_roll
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0

gripper_controller:
  ros__parameters:
    joint: arm_gripper
    state_interfaces:
      - position
      - velocity
    allow_stalling: true
    max_effort: 10.0
    stall_velocity_threshold: 0.001
    stall_timeout: 2.0
    goal_tolerance: 0.05
