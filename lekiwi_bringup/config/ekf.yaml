# robot_localization EKF : fusionne l'odometrie des roues (/odom) et l'IMU (/imu/data)
# pour une base HOLONOME. Publie la tf odom -> base_footprint et /odometry/filtered.
ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true              # base plane : z, roll, pitch forces a 0
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # --- Odometrie roues (omni : vx, vy, vyaw) ---
    odom0: /odom
    # [x, y, z,  roll, pitch, yaw,  vx, vy, vz,  vroll, vpitch, vyaw,  ax, ay, az]
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false

    # --- IMU BNO055 (yaw, vyaw, ax) ---
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
